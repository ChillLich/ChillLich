<!doctype html>
<html lang="ru" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      id="viewport"
      content="width=device-width, initial-scale=1"
    />
    <title>ChillLich | Profile</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/ChillLich/ChillLich/main/avatar_ascii.png" />
    <style>
      /* =========================================
      🎨 КОНФИГУРАЦИЯ ЦВЕТОВ (Меняй здесь!)
      ========================================= */
      :root {
        --font-mono: "Courier New", Courier, monospace;
        --transition-speed: 0.3s;
      }

      /* 💡 СВЕТЛАЯ ТЕМА (Стиль старого BIOS) */
      [data-theme="light"] {
        --bg-color: #c0c0c0;
        --term-header-bg: #0000aa;
        --term-header-text: #ffffff;
        --term-body-bg: #0000aa;
        --term-text-color: #aaaaaa;
        --term-shadow: 2px 2px 0px #000000;
        --btn-bg: #dfdfdf;
        --btn-border: solid #fff #000 #000 #fff;
        --link-color: #ffff55;
      }

      /* 🌙 ТЕМНАЯ ТЕМА (Современный хакерский терминал) */
      [data-theme="dark"] {
        --bg-color: #1a1a1a;
        --term-header-bg: #2d2d2d;
        --term-header-text: #cccccc;
        --term-body-bg: #000000;
        --term-text-color: #ff3333;
        --term-shadow: none;
        --btn-bg: #333333;
        --btn-border: 1px solid #444;
        --link-color: #ff6666;
      }

      /* =========================================
      🛠️ БАЗОВЫЕ СТИЛИ
      ========================================= */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg-color);
        font-family: var(--font-mono);
        transition: background-color var(--transition-speed);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        padding: 40px 20px;
        gap: 24px;
      }

      /* =========================================
      🖥️ ОКНО ТЕРМИНАЛА
      ========================================= */
      .terminal-window {
        width: 100%;
        max-width: 900px;
        border: 2px solid #000;
        box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.5);
        background: var(--term-body-bg);
        transition: background-color var(--transition-speed);
      }

      .terminal-header {
        background: var(--term-header-bg);
        color: var(--term-header-text);
        padding: 6px 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
        font-size: 14px;
        user-select: none;
        border-bottom: 2px solid #000;
        gap: 12px;
        flex-wrap: wrap; /* Кнопки переносятся если не влезают */
      }

      /* Путь: direction: rtl обрезает СЛЕВА, оставляя правую часть видимой */
      .terminal-path {
        flex: 1 1 auto;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        direction: rtl;
        text-align: left;
      }

      /* Кнопки */
      .header-controls {
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .icon-btn {
        background: var(--btn-bg);
        border: var(--btn-border);
        color: inherit;
        cursor: pointer;
        padding: 4px 8px;
        font-family: var(--font-mono);
        font-size: 12px;
        text-decoration: none;
        line-height: 1.4;
        white-space: nowrap;
        flex-shrink: 0;
      }

      [data-theme="dark"] .icon-btn {
        color: #ff3333;
      }
      [data-theme="light"] .icon-btn {
        color: #000;
      }

      /* =========================================
      📝 ТЕЛО ТЕРМИНАЛА — ЕДИНЫЙ ГОРИЗОНТАЛЬНЫЙ СКРОЛЛ
      ========================================= */
      .terminal-body {
        padding: 20px;
        color: var(--term-text-color);
        text-shadow: var(--term-shadow);
        overflow-x: auto; /* Единый горизонтальный скролл для всего */
        overflow-y: visible;
        line-height: 1.6;
        transition:
          color var(--transition-speed),
          text-shadow var(--transition-speed);
      }

      /* Стили для контента внутри терминала */
      .terminal-body a {
        color: var(--link-color);
        text-decoration: underline;
      }

      .terminal-body pre {
        background: transparent;
        padding: 0;
        margin: 0;
        white-space: pre; /* Сохраняем пробелы и переносы */
        word-wrap: normal;
        overflow: visible; /* НЕ создаём внутренний скролл */
      }

      .terminal-body pre.ascii-avatar {
        /* Специально для ASCII-аватара: то же самое, что и обычный pre */
        white-space: pre;
        word-wrap: normal;
        overflow: visible; /* Скроллится вместе со всем body */
      }
      .terminal-body table {
        border-collapse: collapse;
        margin: 1rem 0;
        width: 100%; /* Таблица занимает всю доступную ширину */
      }

      .terminal-body th,
      .terminal-body td {
        border: 1px solid currentColor;
        padding: 8px 12px;
        text-align: left;
        word-wrap: break-word; /* Переносим длинные слова */
        min-width: 120px; /* Минимальная ширина ячейки */
      }

      /* Заголовки таблицы */
      .terminal-body th {
        font-weight: bold;
        background-color: rgba(255, 255, 255, 0.05);
      }

      /* Первая колонка чуть шире */
      .terminal-body td:first-child,
      .terminal-body th:first-child {
        min-width: 150px;
      }

      .terminal-body img {
        max-width: 100%;
        height: auto;
        image-rendering: pixelated;
      }

      /* =========================================
      🦶 ФУТЕР
      ========================================= */
      .site-footer {
        width: 100%;
        max-width: 900px;
        margin-top: 24px;
        padding: 12px 20px;
        font-size: 13px;
        color: var(--term-text-color);
        text-shadow: var(--term-shadow);
        opacity: 0.7;
        transition:
          color var(--transition-speed),
          text-shadow var(--transition-speed),
          opacity var(--transition-speed);
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .site-footer:hover {
        opacity: 1;
      }

      .site-footer a {
        color: var(--link-color);
        text-decoration: underline;
        font-weight: bold;
      }

      .site-footer a:hover {
        text-decoration: none;
      }

      /* Минимальный адаптив только для отступов body */
      @media (max-width: 600px) {
        body {
          padding: 10px;
          gap: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="terminal-window">
      <div class="terminal-header">
        <span class="terminal-path"
          >C:\Users\ChillLich\profile.exe</span
        >
        <div class="header-controls">
          <button
            id="theme-toggle"
            class="icon-btn"
            aria-label="Переключить тему"
          >
            ◑ Theme
          </button>
          <a
            href="https://github.com/ChillLich"
            target="_blank"
            rel="noopener"
            class="icon-btn"
            >★ Profile</a
          >
          <a
            href="https://github.com/ChillLich/ChillLich/"
            target="_blank"
            rel="noopener"
            class="icon-btn"
            >🗁 Repo</a
          >
        </div>
      </div>

      <div class="terminal-body">
        <h2>Hi there 👋</h2>
<!--
**ChillLich/ChillLich** is a ✨ _special_ ✨ repository because its `README.md` (this file) appears on your GitHub profile.

Here are some ideas to get you started:

- 🔭 I’m currently working on ...
- 🌱 I’m currently learning ...
- 👯 I’m looking to collaborate on ...
- 🤔 I’m looking for help with ...
- 💬 Ask me about ...
- 📫 How to reach me: ...
- 😄 Pronouns: ...
- ⚡ Fun fact: ...
-->
      </div>
    </div>

    <footer class="site-footer">
      <span>© 2026</span>
      <span>•</span>
      <a href="https://github.com/ChillLich" target="_blank" rel="noopener"
        >ChillLich</a
      >
      <span>•</span>
      <span>Built with ASCII & &#x2764;</span>
    </footer>

    <script>
      const toggleBtn = document.getElementById("theme-toggle");
      const htmlEl = document.documentElement;
      const STORAGE_KEY = "terminal-theme";

      function getInitialTheme() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) return saved;
        return window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";
      }

      function applyTheme(theme) {
        htmlEl.setAttribute("data-theme", theme);
        localStorage.setItem(STORAGE_KEY, theme);
        toggleBtn.textContent = theme === "dark" ? "☀ Light" : "◑ Dark";
      }

      applyTheme(getInitialTheme());

      toggleBtn.addEventListener("click", () => {
        const current = htmlEl.getAttribute("data-theme");
        applyTheme(current === "dark" ? "light" : "dark");
      });
      (function () {
        var MAX_W = 900;
        var MIN_SCALE = 0.4;
        var vp = document.getElementById("viewport");

        function applyScale() {
          var w = window.innerWidth || document.documentElement.clientWidth;
          var scale = w / MAX_W;

          // Ограничиваем масштаб от 0.4 до 1.0
          if (scale > 1) scale = 1;
          if (scale < MIN_SCALE) scale = MIN_SCALE;

          // Меняем мета-тег
          vp.setAttribute(
            "content",
            "width=" + MAX_W + ", initial-scale=" + scale,
          );
        }

        // Запуск после загрузки страницы
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", applyScale);
        } else {
          applyScale();
        }
      })();
    </script>
  </body>
</html>
